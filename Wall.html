<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Positivity Wall</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="styles.css">

</head>

<body class="bg-gradient-to-br from-pink-100 via-purple-100 to-indigo-100 min-h-screen">

<!-- NAVBAR -->

<header class="backdrop-blur-lg bg-white/70 shadow-md">

<div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">

<h1 class="font-bold text-indigo-600 text-lg">
🌿 Student Support Hub
</h1>

<nav class="space-x-6">

<a href="index.html">Home</a>
<a href="checkin.html">Mood Check</a>
<a href="wall.html" class="text-indigo-600 font-semibold">Positivity Wall</a>

</nav>

</div>

</header>

<!-- PAGE HEADER -->

<section class="text-center py-16 px-6">

<h2 class="text-4xl font-bold text-gray-800 mb-4">
Anonymous Positivity Wall
</h2>

<p class="text-gray-600 max-w-xl mx-auto">

Leave a message for someone who might need encouragement today.  
Kindness spreads faster than stress.

</p>

</section>

<!-- INPUT -->

<div class="max-w-2xl mx-auto flex gap-3 px-6 mb-10">

<input
id="messageInput"
placeholder="Write something encouraging..."
class="flex-1 px-4 py-3 rounded-full border shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-300">

<button
id="postMessage"
class="bg-gradient-to-r from-indigo-500 to-purple-500 text-white px-6 rounded-full shadow hover:scale-105 transition">

Post

</button>

</div>

<!-- MESSAGE WALL -->

<div
id="messageWall"
class="max-w-4xl mx-auto grid md:grid-cols-2 gap-6 px-6 pb-16">

</div>

<footer class="text-center text-gray-500 pb-10">

A small message can make someone's day better.

</footer>

<script src="script.js"></script>

</body>
</html>
